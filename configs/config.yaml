# ─────────────────────────────────────────────
# Aereo Water Body Segmentation — Config File
# ─────────────────────────────────────────────

# ── Model ─────────────────────────────────────
model:
  # name: "unet"                # "unet" for baseline | "unetplusplus" for main run
  name: "unetplusplus"
  encoder: "efficientnet-b4"  # pretrained encoder backbone
  encoder_weights: "imagenet" # pretrained weights
  in_channels: 3              # RGB input
  classes: 1                  # binary segmentation
  attention: "scse"           # only applied for unetplusplus | null for unet
  # attention: null

# ── Training ──────────────────────────────────
train:
  epochs: 60                  # 15 for unet baseline | 50 for unetplusplus
  batch_size: 16              # reduce to 8 if OOM on Kaggle
  lr: 0.0001                   # Adam learning rate 
  num_workers: 2
  seed: 42
  image_size: 256

# ── Early Stopping ────────────────────────────
early_stopping:
  patience: 12                # stop if val IoU doesn't improve for 12 epochs
  min_delta: 0.001            # minimum improvement to count as progress

# ── LR Scheduler ──────────────────────────────
scheduler:
  name: "ReduceLROnPlateau"
  mode: "max"                 # maximize val IoU
  factor: 0.5                 # reduce LR by half
  patience: 7                 # reduce after 7 epochs no improvement
  min_lr: 0.000001            # floor for LR

# ── Paths (Local) ─────────────────────────────
paths:
  image_dir: "C:\\Users\\RadheRadhe\\Desktop\\Self project\\CV\\Aereo\\Water Bodies Dataset\\Images"
  mask_dir: "C:\\Users\\RadheRadhe\\Desktop\\Self project\\CV\\Aereo\\Water Bodies Dataset\\Masks"
  valid_files: "C:\\Users\\RadheRadhe\\Desktop\\Self project\\CV\\Aereo\\data\\valid_files.txt"
  checkpoint_dir: "C:\\Users\\RadheRadhe\\Desktop\\Self project\\CV\\Aereo\\outputs\\checkpoints"

# ── Checkpoint / Resume ───────────────────────
checkpoint:
  save_best: true             # save best_model.pth when val IoU improves
  save_last: true             # save last_checkpoint.pth every epoch
  resume: false               # set true to resume from last_checkpoint.pth
  resume_path: "C:\\Users\\RadheRadhe\\Desktop\\Self project\\CV\\Aereo\\outputs\\checkpoints\\last_checkpoint.pth"

# ── W&B ───────────────────────────────────────
wandb:
  project: "aereo-water-segmentation"
  # run_name: "unet-baseline"   # "unet-baseline" | "unetplusplus-efficientnet-b4"
  run_name: "unetplusplus-efficientnet-b4"
  entity: null                # your W&B username if needed, else null

# ── Debug Mode (local CPU testing) ────────────
debug:
  enabled: false              # set true for local error checking
  max_samples: 50             # only load 50 images
  epochs: 2
  batch_size: 2